<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title data-i18n="meta.watchDetail"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell app-shell--detail">
      <main class="page page--detail">
        <section
          class="detail-section detail-section--confirmation"
          id="watchConfirmation"
          role="status"
          aria-live="polite"
          hidden
        >
          <span class="detail-confirmation__icon" aria-hidden="true">✓</span>
          <div class="detail-confirmation__copy">
            <p class="confirmation-title" id="watchConfirmationTitle" data-i18n="detail.createdTitle"></p>
            <p id="watchConfirmationCopy" data-i18n="detail.createdCopy"></p>
          </div>
          <button
            class="detail-confirmation__dismiss"
            id="watchConfirmationDismiss"
            type="button"
            data-i18n-aria-label="detail.dismissCreated"
          >×</button>
        </section>

        <header class="detail-header">
          <a class="detail-edit-action" id="watchEditAction" href="new-watch.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m4 20 4.25-1 10.5-10.5a2.12 2.12 0 0 0-3-3L5.25 16Z"></path>
              <path d="m14.5 6.5 3 3"></path>
            </svg>
            <span data-i18n="detail.edit"></span>
          </a>
          <p class="category-pill" id="watchCategory"></p>
          <h1 id="watchTitle" data-i18n="detail.title"></h1>
          <div class="detail-paused-state" id="watchPausedState" hidden>
            <p class="detail-paused-state__title">
              <span aria-hidden="true">⏸</span>
              <span data-i18n="detail.monitoringPausedTitle"></span>
            </p>
            <p data-i18n="detail.monitoringPausedCopy"></p>
            <button class="watch-fact-check__button detail-paused-state__resume" id="watchPausedResume" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m8 5 11 7-11 7Z"></path>
              </svg>
              <span data-i18n="detail.resumeWatch"></span>
            </button>
          </div>
          <p class="status-label" id="watchStatus"></p>
          <p class="detail-header__message" id="watchNotFound" hidden></p>
        </header>

        <a class="detail-first-watch-home" id="watchCreatedHomeAction" href="index.html?entry=navigation" data-i18n="detail.viewHomeReport" hidden></a>

        <section class="detail-card" id="watchBriefing" aria-labelledby="whatIKnowTitle">
          <h2 class="section-heading" id="whatIKnowTitle" data-i18n="detail.whatIKnow"></h2>

          <div class="detail-card__primary" id="watchPrimary">
            <section class="detail-card__field" data-detail-field="currentSituation" hidden>
              <h3 class="section-heading" data-i18n="detail.currentSituation"></h3>
              <p id="watchCurrentSituation"></p>
            </section>

            <section class="detail-card__field detail-card__field--recommendation" data-detail-field="recommendation" hidden>
              <h3 class="section-heading" data-i18n="detail.recommendation"></h3>
              <p id="watchRecommendation"></p>
            </section>
          </div>

          <section class="detail-card__source" id="watchOriginalSource" aria-labelledby="originalSourceTitle" hidden>
            <h3 class="section-heading" id="originalSourceTitle" data-i18n="detail.source"></h3>
            <p class="detail-card__source-name" id="watchSourceName" hidden></p>
            <p class="detail-card__source-title" id="watchSourceTitle" hidden></p>
            <a
              class="detail-card__source-link"
              id="watchSourceLink"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n-aria-label="detail.openOriginalArticle"
              hidden
            >
              <span data-i18n="detail.openOriginalArticle"></span>
              <span aria-hidden="true">↗</span>
            </a>
          </section>
        </section>

        <section class="detail-card" id="watchWhyToday" aria-labelledby="whyTodayTitle" hidden>
          <h2 class="section-heading" id="whyTodayTitle" data-i18n="detail.whyToday"></h2>
          <div class="detail-card__primary">
            <div class="detail-card__field">
              <p id="watchWhyTodayCopy"></p>
            </div>
          </div>
        </section>

        <aside class="personal-note" id="watchWhyFollowing" aria-labelledby="whyFollowingTitle" hidden>
          <h2 class="section-heading" id="whyFollowingTitle" data-i18n="detail.whyFollowing"></h2>
          <blockquote id="watchWhyFollowingCopy"></blockquote>
        </aside>

        <section class="timeline" id="watchTimelineSection" aria-labelledby="timelineTitle" hidden>
          <h2 class="section-heading" id="timelineTitle" data-i18n="detail.howWeGotHere"></h2>
          <ol id="watchTimeline"></ol>
        </section>

        <section class="watch-preparing" id="watchPreparing" role="status" aria-live="polite" hidden>
          <span class="watch-preparing__spinner" aria-hidden="true"></span>
          <div>
            <h2 data-i18n="detail.preparingTitle"></h2>
            <p data-i18n="detail.preparingCopy"></p>
          </div>
        </section>

        <section class="detail-card" id="watchFacts" aria-labelledby="watchFactsTitle" hidden>
          <h2 class="section-heading" id="watchFactsTitle" data-i18n="detail.watchFacts"></h2>
          <div class="detail-card__metadata" id="watchMetadata">
            <section data-detail-field="sources" hidden>
              <h3 class="section-heading" data-i18n="detail.sources"></h3>
              <ul id="watchSources"></ul>
            </section>
            <section data-detail-field="lastChecked" hidden>
              <h3 class="section-heading" data-i18n="detail.lastChecked"></h3>
              <div class="watch-fact-check">
                <p id="watchLastChecked"></p>
                <button class="watch-fact-check__button" id="watchCheckNow" type="button">
                  <span class="watch-fact-check__spinner" aria-hidden="true" hidden></span>
                  <span id="watchCheckNowLabel" data-i18n="detail.checkNow"></span>
                </button>
              </div>
              <p class="watch-fact-check__feedback" id="watchCheckFeedback" role="status" aria-live="polite" hidden></p>
            </section>
            <section data-detail-field="latestChange" hidden>
              <h3 class="section-heading" data-i18n="detail.latestChange"></h3>
              <p id="watchLatestChange"></p>
              <p id="watchLatestChangeAt"></p>
            </section>
            <section data-detail-field="confidence" hidden>
              <h3 class="section-heading" data-i18n="detail.confidence"></h3>
              <p id="watchConfidence"></p>
            </section>
          </div>
        </section>

        <section class="external-actions" id="watchActionsSection" aria-labelledby="actionsTitle" hidden>
          <h2 class="section-heading" id="actionsTitle" data-i18n="detail.whatYouCanDo"></h2>
          <div class="external-actions__list" id="watchExternalActions"></div>
        </section>

        <section class="watch-management" id="watchManagement" aria-labelledby="manageWatchTitle">
          <h2 class="section-heading" id="manageWatchTitle" data-i18n="detail.manageWatch"></h2>
          <div class="watch-management__controls">
            <button class="button button--secondary watch-management__pause" id="watchPauseResume" type="button">
              <svg id="watchPauseIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 6v12M15 6v12"></path>
              </svg>
              <svg id="watchResumeIcon" viewBox="0 0 24 24" aria-hidden="true" hidden>
                <path d="m8 5 11 7-11 7Z"></path>
              </svg>
              <span id="watchPauseResumeLabel"></span>
            </button>
            <button class="watch-secondary-action watch-management__delete" id="watchDelete" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16"></path>
                <path d="M9 7V4h6v3"></path>
                <path d="m6 7 1 13h10l1-13"></path>
                <path d="M10 11v5M14 11v5"></path>
              </svg>
              <span data-i18n="detail.deleteWatch"></span>
            </button>
          </div>
        </section>

        <dialog class="watch-delete-dialog" id="watchDeleteDialog" aria-labelledby="watchDeleteTitle" aria-describedby="watchDeleteCopy">
          <form method="dialog">
            <h2 id="watchDeleteTitle" data-i18n="detail.deleteTitle"></h2>
            <p id="watchDeleteCopy" data-i18n="detail.deleteCopy"></p>
            <div class="watch-delete-dialog__actions">
              <button class="button button--secondary" id="watchDeleteCancel" value="cancel" data-i18n="detail.cancel"></button>
              <button class="button watch-delete-dialog__confirm" id="watchDeleteConfirm" value="delete" data-i18n="detail.deleteWatch"></button>
            </div>
          </form>
        </dialog>

        <dialog class="watch-edit-sheet" id="watchEditSheet" aria-label="Edit Watch">
          <header class="watch-edit-sheet__header">
            <div class="watch-edit-sheet__header-content">
              <button class="watch-edit-sheet__action" id="watchEditCancel" type="button" data-i18n="detail.cancel"></button>
              <h1 data-i18n="newWatch.editHeading"></h1>
              <button
                class="watch-edit-sheet__action watch-edit-sheet__action--save"
                id="watchEditSave"
                type="button"
                data-i18n="newWatch.saveChanges"
                disabled
              ></button>
            </div>
          </header>
          <iframe
            class="watch-edit-sheet__frame"
            id="watchEditFrame"
            title="Edit Watch"
            data-i18n-title="newWatch.editHeading"
          ></iframe>
        </dialog>
      </main>

      <a class="floating-action floating-action--detail" href="new-watch.html">
        <span aria-hidden="true">+</span>
        <span data-i18n="common.newWatch"></span>
      </a>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
