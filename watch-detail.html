<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.watchDetail"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page page--detail">
        <header class="page__header">
          <a class="back-link" href="index.html" data-i18n="detail.back"></a>
          <h1 id="watchTitle" data-i18n="detail.title"></h1>
          <p class="intro" id="watchIntro" data-i18n="detail.loading"></p>
        </header>

        <section class="detail-section detail-section--confirmation" id="watchConfirmation" hidden>
          <p class="confirmation-title" data-i18n="detail.confirmationTitle"></p>
          <p data-i18n="detail.confirmationCopy"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.request"></h2>
          <p id="watchRequest"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.status"></h2>
          <p id="watchStatus"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.created"></h2>
          <p id="watchCreatedAt"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.lastChecked"></h2>
          <p id="watchLastChecked"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.latestUpdate"></h2>
          <p id="watchLatestUpdate"></p>
        </section>

        <section class="detail-section">
          <h2 data-i18n="detail.sources"></h2>
          <ul id="watchSources"></ul>
        </section>

        <section class="timeline">
          <h2 data-i18n="detail.timeline"></h2>
          <ol id="watchTimeline"></ol>
        </section>

        <a class="button button--primary" id="watchExternalAction" href="#" target="_blank" rel="noopener" hidden data-i18n="common.openSource"></a>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
