<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Assistant — Watch Detail</title>
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page page--detail">
        <header class="page__header">
          <a class="back-link" href="index.html">Back to Home</a>
          <h1 id="watchTitle">Watch detail</h1>
          <p class="intro" id="watchIntro">Loading watch details...</p>
        </header>

        <section class="detail-section detail-section--confirmation" id="watchConfirmation" hidden>
          <p class="confirmation-title">I’m watching this for you.</p>
          <p>I’ll let you know when something important changes.</p>
        </section>

        <section class="detail-section">
          <h2>Request</h2>
          <p id="watchRequest"></p>
        </section>

        <section class="detail-section">
          <h2>Status</h2>
          <p id="watchStatus"></p>
        </section>

        <section class="detail-section">
          <h2>Created</h2>
          <p id="watchCreatedAt"></p>
        </section>

        <section class="detail-section">
          <h2>Last checked</h2>
          <p id="watchLastChecked"></p>
        </section>

        <section class="detail-section">
          <h2>Latest update</h2>
          <p id="watchLatestUpdate"></p>
        </section>

        <section class="detail-section">
          <h2>Sources</h2>
          <ul id="watchSources"></ul>
        </section>

        <section class="timeline">
          <h2>Timeline</h2>
          <ol id="watchTimeline"></ol>
        </section>

        <a class="button button--primary" id="watchExternalAction" href="#" target="_blank" rel="noopener" hidden>Open source</a>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
