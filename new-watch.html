<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Assistant — New Watch</title>
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page page--form">
        <header class="page__header">
          <a class="back-link" href="index.html">Back</a>
          <h1>New watch</h1>
          <p class="intro">Tell the assistant what to track in plain language.</p>
        </header>

        <form class="watch-form" id="newWatchForm">
          <label for="watchDescription">Watch description</label>
          <textarea id="watchDescription" name="watchDescription" rows="6" placeholder="Track EasyJet Christmas flight prices for London to Mallorca"></textarea>

          <label for="watchUrl">Optional URL</label>
          <input id="watchUrl" name="watchUrl" type="url" placeholder="https://www.easyjet.com/" />

          <button class="button button--primary" type="submit">Create watch</button>
          <p class="form-note">This is a prototype form. Submission is handled in the browser.</p>
        </form>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
