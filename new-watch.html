<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.newWatch"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page page--form">
        <header class="page__header">
          <a class="back-link" href="index.html" data-i18n="common.back"></a>
          <h1 data-i18n="newWatch.title"></h1>
          <p class="intro" data-i18n="newWatch.intro"></p>
        </header>

        <form class="watch-form" id="newWatchForm">
          <label for="newWatchInput" data-i18n="newWatch.label"></label>
          <div class="input-group">
            <textarea
              id="newWatchInput"
              name="watchRequest"
              rows="6"
              class="assistant-input"
              data-i18n-placeholder="newWatch.placeholder"
            ></textarea>
            <div class="input-icons" aria-hidden="true">
              <button type="button" class="icon-button" data-i18n-aria-label="newWatch.attachLabel">📎</button>
              <button type="button" class="icon-button" data-i18n-aria-label="newWatch.voiceLabel">🎤</button>
            </div>
          </div>

          <div class="input-examples" data-i18n-aria-label="newWatch.examplesAriaLabel">
            <p class="examples-label" data-i18n="newWatch.examplesTitle"></p>
            <ul>
              <li data-i18n="newWatch.exampleOne"></li>
              <li data-i18n="newWatch.exampleTwo"></li>
              <li data-i18n="newWatch.exampleThree"></li>
              <li data-i18n="newWatch.exampleFour"></li>
            </ul>
          </div>

          <p class="input-help" id="inputTypeHint" data-i18n="newWatch.hint"></p>

          <button class="button button--primary" type="submit" data-i18n="newWatch.submit"></button>
          <p class="form-error" id="watchError" aria-live="polite"></p>
          <p class="form-note" data-i18n="newWatch.note"></p>
        </form>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
