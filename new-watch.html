<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.newWatch"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell app-shell--new-watch">
      <main class="page page--form">
        <a class="back-link new-watch-back" href="index.html" data-i18n="newWatch.back"></a>

        <header class="new-watch-header">
          <h1 data-i18n="newWatch.heading"></h1>
        </header>

        <form class="watch-form" id="newWatchForm">
          <div class="watch-composer">
            <label class="visually-hidden" for="newWatchInput" data-i18n="newWatch.label"></label>
            <button
              class="watch-composer__microphone"
              type="button"
              disabled
              data-i18n-aria-label="newWatch.voiceUnavailable"
              data-i18n-title="newWatch.voiceUnavailable"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z"></path>
                <path d="M18 11.5a6 6 0 0 1-12 0M12 17.5V21M9 21h6"></path>
              </svg>
            </button>
            <button
              class="watch-composer__clear"
              type="button"
              data-watch-clear
              data-i18n-aria-label="newWatch.clearWatchInput"
              hidden
            >×</button>
            <textarea
              id="newWatchInput"
              name="watchRequest"
              rows="1"
              class="assistant-input"
              data-i18n-placeholder="newWatch.placeholder"
              autofocus
            ></textarea>
            <p class="watch-composer__helper" data-i18n="newWatch.urlHelper"></p>
          </div>

          <button
            class="watch-reason-toggle"
            type="button"
            data-note-toggle
            aria-expanded="false"
            aria-controls="watchReason"
            data-i18n="newWatch.addNote"
          ></button>

          <div class="watch-reason" id="watchReason" hidden>
            <div class="watch-reason__inner">
              <div class="watch-reason__header">
                <span data-i18n="newWatch.noteHeading"></span>
              </div>
              <div class="watch-reason__field">
                <label class="visually-hidden" for="whyFollowingInput" data-i18n="newWatch.whyFollowingLabel"></label>
                <input
                  id="whyFollowingInput"
                  name="whyFollowing"
                  type="text"
                  data-i18n-placeholder="newWatch.whyFollowingPlaceholder"
                />
                <button
                  class="watch-reason__microphone"
                  type="button"
                  disabled
                  data-i18n-aria-label="newWatch.voiceUnavailable"
                  data-i18n-title="newWatch.voiceUnavailable"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z"></path>
                    <path d="M18 11.5a6 6 0 0 1-12 0M12 17.5V21M9 21h6"></path>
                  </svg>
                </button>
                <button
                  class="watch-reason__close"
                  type="button"
                  data-note-close
                  data-i18n-aria-label="newWatch.closeNote"
                >×</button>
              </div>
            </div>
          </div>

          <button class="watch-composer__submit" id="newWatchSubmit" type="submit" disabled>
            <span aria-hidden="true">➤</span>
            <span id="newWatchSubmitLabel" data-i18n="newWatch.submit"></span>
          </button>

          <p class="watch-composer__feedback" id="inputTypeHint" aria-live="polite" hidden></p>

          <section class="url-analysis" id="urlAnalysis" aria-live="polite" hidden>
            <div class="url-analysis__processing" id="urlAnalysisProcessing" hidden>
              <span class="url-analysis__spinner" aria-hidden="true"></span>
              <p id="urlAnalysisMessage"></p>
            </div>

            <div class="url-review" id="urlReview" tabindex="-1" hidden>
              <div class="url-review__success" id="urlReviewSuccess">
                <span aria-hidden="true">✓</span>
                <h2 data-i18n="newWatch.urlReviewFound"></h2>
              </div>
              <div class="url-review__failure" id="urlReviewFailure" hidden>
                <h2 data-i18n="newWatch.urlReviewFailed"></h2>
                <p data-i18n="newWatch.urlReviewHelp"></p>
              </div>

              <div class="url-review__field">
                <label for="urlReviewTitle" data-i18n="newWatch.urlReviewTitle"></label>
                <input id="urlReviewTitle" type="text" required disabled />
              </div>
              <div class="url-review__field">
                <label for="urlReviewSummary" data-i18n="newWatch.urlReviewWatchingFor"></label>
                <textarea id="urlReviewSummary" rows="3" required disabled></textarea>
              </div>
              <div class="url-review__source">
                <span data-i18n="newWatch.urlReviewSource"></span>
                <strong id="urlReviewSource"></strong>
              </div>

              <div class="url-review__actions">
                <button class="button button--primary" id="urlReviewCreate" type="button" data-i18n="newWatch.urlReviewCreate"></button>
                <button class="button button--secondary" id="urlReviewEdit" type="button" data-i18n="newWatch.urlReviewEdit"></button>
                <button class="button button--secondary" id="urlReviewCancel" type="button" data-i18n="newWatch.urlReviewCancel" hidden></button>
              </div>
            </div>
          </section>

          <p class="form-error" id="watchError" aria-live="polite"></p>
        </form>

        <section class="recent-watches" id="recentWatchesSection" aria-labelledby="recentTitle" hidden>
          <h2 id="recentTitle" data-i18n="newWatch.recent"></h2>
          <div class="recent-watches__list" id="recentWatchesList"></div>
        </section>

      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
