<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.followStory"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page page--follow-story">
        <header class="page__header">
          <h1 data-i18n="followStory.title"></h1>
          <p class="intro" data-i18n="followStory.intro"></p>
        </header>

        <section class="detail-section">
          <p class="story-meta" data-i18n="followStory.meta"></p>
          <h2 class="section-heading" data-i18n="followStory.understoodTitle"></h2>
          <p data-i18n="followStory.understoodCopy"></p>
        </section>

        <section class="chips">
          <h2 class="visually-hidden" data-i18n="followStory.contextTitle"></h2>
          <div class="chip" data-i18n="followStory.travelChip"></div>
          <div class="chip" data-i18n="followStory.priceAlertsChip"></div>
          <div class="chip" data-i18n="followStory.supplyChainChip"></div>
        </section>

        <div class="actions-row">
          <button class="button button--secondary" type="button" data-i18n="followStory.edit"></button>
          <button class="button button--primary" type="button" data-i18n="followStory.follow"></button>
        </div>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
