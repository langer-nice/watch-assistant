<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.flow3"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell app-shell--flow-3">
      <main class="flow-3" aria-live="polite">
        <section
          class="flow-3__screen flow-3__screen--examples"
          data-flow-3-screen="0"
          tabindex="-1"
          aria-labelledby="flow3CheckingTitle"
        >
          <h1 id="flow3CheckingTitle" data-i18n="flow3.checkingHeadline"></h1>

          <div class="flow-3__examples-content">
            <ul class="flow-3__examples" data-i18n-aria-label="flow3.checkingExamplesLabel" hidden>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingExampleOne" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingExampleTwo" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingExampleThree" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingExampleFour" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingExampleFive" hidden></li>
            </ul>

            <p class="flow-3__closing-copy flow-3__reveal" data-flow-3-reveal data-i18n="flow3.checkingConclusion" hidden></p>
          </div>

          <button class="button button--secondary flow-3__continue flow-3__reveal" type="button" data-flow-3-reveal data-flow-3-next hidden>
            <span data-i18n="flow3.continue"></span>
            <span aria-hidden="true">→</span>
          </button>
        </section>

        <section
          class="flow-3__screen flow-3__screen--examples"
          data-flow-3-screen="1"
          tabindex="-1"
          aria-labelledby="flow3ForgottenTitle"
          hidden
        >
          <h1 id="flow3ForgottenTitle" data-i18n="flow3.forgottenHeadline"></h1>

          <div class="flow-3__examples-content">
            <ul class="flow-3__examples" data-i18n-aria-label="flow3.forgottenExamplesLabel" hidden>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.forgottenExampleOne" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.forgottenExampleTwo" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.forgottenExampleThree" hidden></li>
              <li class="flow-3__reveal" data-flow-3-reveal data-i18n="flow3.forgottenExampleFour" hidden></li>
            </ul>

            <p class="flow-3__closing-copy flow-3__reveal" data-flow-3-reveal data-i18n="flow3.forgottenConclusion" hidden></p>
          </div>

          <button class="button button--secondary flow-3__continue flow-3__reveal" type="button" data-flow-3-reveal data-flow-3-next hidden>
            <span data-i18n="flow3.continue"></span>
            <span aria-hidden="true">→</span>
          </button>
        </section>

        <section
          class="flow-3__screen flow-3__screen--solution"
          data-flow-3-screen="2"
          tabindex="-1"
          aria-labelledby="flow3SolutionTitle"
          hidden
        >
          <div class="flow-3__statement">
            <p class="flow-3__eyebrow" data-i18n="common.brand"></p>
            <h1 id="flow3SolutionTitle" data-i18n="flow3.solutionHeadline"></h1>
            <p class="flow-3__supporting flow-3__reveal" data-flow-3-reveal data-i18n="flow3.solutionSupporting" hidden></p>
          </div>

          <a class="button button--primary flow-3__cta flow-3__reveal" data-flow-3-reveal data-i18n="flow3.createWatch" href="new-watch.html" hidden></a>
        </section>
      </main>
    </div>

    <script type="module" src="src/js/flow-3.js"></script>
  </body>
</html>
