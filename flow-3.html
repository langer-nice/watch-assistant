<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title data-i18n="meta.flow3"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body data-flow-language-gate>
    <div class="app-shell app-shell--flow-3">
      <main class="flow-3" aria-live="polite">
        <section
          class="flow-3__screen flow-3__screen--promise"
          data-flow-3-screen="0"
          tabindex="-1"
          aria-labelledby="flow3PromiseTitle"
        >
          <div class="flow-3__top" aria-hidden="true"></div>

          <div class="flow-3__content flow-3__content--centered">
            <p class="flow-3__eyebrow" data-i18n="common.brand"></p>
            <h1 class="flow-3__word-sequence" id="flow3PromiseTitle" data-flow-3-word-sequence data-flow-3-i18n="flow3.promiseHeadline" aria-hidden="true"></h1>
            <p class="flow-3__supporting flow-3__word-sequence" data-flow-3-word-sequence data-flow-3-i18n="flow3.promiseSupporting" aria-hidden="true"></p>
          </div>

          <footer class="flow-3__actions">
            <button class="button flow-3__cta flow-3__cta--light flow-3__reveal flow-3__reveal--fade" type="button" data-flow-3-reveal data-flow-3-next aria-hidden="true" disabled>
              <span data-i18n="flow3.seeHowItWorks"></span>
              <span aria-hidden="true">→</span>
            </button>
          </footer>
        </section>

        <section
          class="flow-3__screen flow-3__screen--examples"
          data-flow-3-screen="1"
          tabindex="-1"
          aria-labelledby="flow3CheckingTitle"
          hidden
        >
          <header class="flow-3__top">
            <h1 id="flow3CheckingTitle" data-i18n="flow3.checkingHeadline"></h1>
          </header>

          <div class="flow-3__content flow-3__examples-content" data-flow-3-examples-scroll>
            <ul class="flow-3__examples" data-flow-3-examples data-i18n-aria-label="flow3.checkingExamplesLabel" hidden></ul>
          </div>

          <footer class="flow-3__actions">
            <button class="button button--secondary flow-3__continue flow-3__reveal" type="button" data-flow-3-reveal data-flow-3-next hidden>
              <span data-i18n="flow3.continue"></span>
              <span aria-hidden="true">→</span>
            </button>
          </footer>
        </section>

        <section
          class="flow-3__screen flow-3__screen--solution"
          data-flow-3-screen="2"
          tabindex="-1"
          aria-labelledby="flow3SolutionTitle"
          hidden
        >
          <div class="flow-3__top" aria-hidden="true"></div>

          <div class="flow-3__content flow-3__content--centered">
            <p class="flow-3__solution-intro" data-i18n="flow3.solutionOpening"></p>
            <h1 class="flow-3__reveal" id="flow3SolutionTitle" data-flow-3-reveal data-i18n="flow3.solutionWatch" hidden></h1>
            <p class="flow-3__supporting flow-3__reveal" data-flow-3-reveal data-i18n="flow3.solutionRelief" hidden></p>
          </div>

          <footer class="flow-3__actions">
            <a class="button flow-3__cta flow-3__cta--light flow-3__reveal" data-flow-3-reveal data-complete-onboarding data-i18n="flow3.createWatch" href="new-watch.html" hidden></a>
          </footer>
        </section>
      </main>
    </div>

    <script type="module" src="src/js/flow-3.js"></script>
  </body>
</html>
