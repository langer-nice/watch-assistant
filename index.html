<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="meta.home"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/scss/main.scss" />
  </head>
  <body>
    <div class="app-shell app-shell--home">
      <a
        class="home-introduction-link"
        href="flow-3.html"
        data-intro-replay
        data-i18n-aria-label="home.viewIntroduction"
        data-i18n-title="home.viewIntroduction"
      >
        <span aria-hidden="true">ⓘ</span>
      </a>

      <main class="page page--home">
        <section class="briefing-report" aria-labelledby="homeSummaryLabel">
          <header class="briefing-summary__masthead">
            <p data-i18n="home.briefLabel"></p>
            <time class="briefing-summary__timestamp" id="homeBriefingDate"></time>
          </header>

          <div class="briefing-summary">
            <h1 class="briefing-summary__greeting" id="homeSummaryLabel"></h1>
            <p class="briefing-summary__total" id="homeCheckedSummary"></p>

            <ul class="briefing-summary__statuses" aria-label="Status overview" data-i18n-aria-label="home.statusOverviewLabel">
              <li class="briefing-summary__status briefing-summary__status--action">
                <span class="briefing-summary__dot" aria-hidden="true"></span>
                <span><strong id="homeAttentionCount"></strong> <span id="homeAttentionLabel"></span></span>
              </li>
              <li class="briefing-summary__status briefing-summary__status--update">
                <span class="briefing-summary__dot" aria-hidden="true"></span>
                <span><strong id="homeUpdatedCount"></strong> <span id="homeUpdatedLabel"></span></span>
              </li>
              <li class="briefing-summary__status briefing-summary__status--success">
                <span class="briefing-summary__dot" aria-hidden="true"></span>
                <span><strong id="homeNoChangesCount"></strong> <span id="homeUnchangedLabel"></span></span>
              </li>
            </ul>
          </div>
        </section>

        <section class="confirmation-banner confirmation-banner--watch-created" id="homeConfirmation" hidden>
          <span class="confirmation-banner__new-badge" id="homeConfirmationBadge" data-i18n="home.newBadge" hidden></span>
          <p class="banner-title" data-i18n="home.confirmationTitle"></p>
          <p class="banner-watch" id="homeConfirmationCopy" data-i18n="home.confirmationPlaceholder"></p>
          <p class="banner-copy" data-i18n="home.confirmationCopy"></p>
          <div class="banner-actions">
            <a class="banner-link" id="homeConfirmationLink" href="#" data-i18n="home.viewWatch"></a>
            <button class="banner-dismiss" type="button" id="homeConfirmationDismiss" data-i18n="home.dismiss"></button>
          </div>
        </section>

        <section class="briefing-feed" aria-label="Briefing items" data-i18n-aria-label="home.briefingItemsLabel">
          <div id="homeBriefingList">
            <section class="briefing-group" id="homeAttentionSection" aria-labelledby="homeAttentionSectionLabel" hidden>
              <p class="briefing-group__label" id="homeAttentionSectionLabel" data-i18n="home.needsAttentionSection"></p>
              <div id="homeAttentionList"></div>
            </section>

            <section class="briefing-group" id="homeUpdatedSection" aria-labelledby="homeUpdatedSectionLabel" hidden>
              <p class="briefing-group__label" id="homeUpdatedSectionLabel" data-i18n="home.updatedSection"></p>
              <div id="homeUpdatedList"></div>
            </section>
          </div>

          <section class="all-quiet" id="homeAllQuiet" aria-labelledby="allQuietTitle">
            <p class="all-quiet__label" data-i18n="home.everythingLabel"></p>
            <h2 id="allQuietTitle" data-i18n="home.everythingTitle"></h2>
            <p class="all-quiet__summary">
              <span id="homeEverythingChecked"></span>
              <span data-i18n="home.everythingNoChanges"></span>
            </p>
            <a class="editorial-link" href="watches.html" data-i18n="home.allWatches"></a>
          </section>
        </section>
      </main>

      <a class="floating-action floating-action--home" href="new-watch.html">
        <span aria-hidden="true">+</span>
        <span data-i18n="common.newWatch"></span>
      </a>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
